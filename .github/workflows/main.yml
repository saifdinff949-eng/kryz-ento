name: Build Android APK

on:
  push:
    branches:
      - main  # أو master حسب اسم الفرع الرئيسي عندك
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # يمكنك تغيير النسخة حسب حاجة تطبيقك

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug # تم اختيار debug لضمان البناء بدون الحاجة لمفاتيح توقيع حالياً

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
