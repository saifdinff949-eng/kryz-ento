name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # تحديث للنسخة 4

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # تحديث للنسخة 4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # هذا هو التحديث الأهم (نسخة 4)
        with:
          name: my-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
