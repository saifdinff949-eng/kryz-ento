name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Fix Dependencies and Build
        run: |
          # هذا السطر يبحث عن المجلد الذي يحتوي على ملف pubspec.yaml ويدخل إليه
          PROJECT_PATH=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          echo "Found project at: $PROJECT_PATH"
          cd $PROJECT_PATH
          flutter pub get
          flutter build apk --debug
          # نقل الملف لمكان معروف لرفعه لاحقاً
          mkdir -p $GITHUB_WORKSPACE/output
          cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/output/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: output/app-debug.apk
