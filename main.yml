name: Manual Build APK

on:
  workflow_dispatch: # هذا يجعلك تشغل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build Process
        run: |
          # البحث عن ملف المشروع وتشغيله
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          cd $PROJECT_ROOT
          flutter pub get
          flutter build apk --debug
          
          # تجهيز المجلد للتحميل
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/output_apk/

      - name: Download Your APK
        uses: actions/upload-artifact@v4
        with:
          name: My_Application_APK
          path: output_apk/app-debug.apk
